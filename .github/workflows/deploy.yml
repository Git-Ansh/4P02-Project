name: Deploy Backend to VPS

on:
  push:
    branches: [ main ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run tests
        working-directory: backend
        run: python -m pytest tests/ -v --tb=short
        env:
          MONGODB_URI: mongodb://localhost:27017
          JWT_SECRET: test-secret-key-for-testing
          DB_NAME: test_academic_fbi

  deploy:
    name: Deploy to VPS
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
    - uses: actions/checkout@v4

    - name: Deploy to VPS via SSH
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USERNAME }}
        key: ${{ secrets.VPS_SSH_KEY }}
        passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
        port: ${{ secrets.VPS_PORT }}
        envs: GITHUB_TOKEN
        script: |
          set -e
          cd ~/COSC_4P02/Project/4P02-Project

          # Pull latest changes using GitHub token (no VPS credentials needed)
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/Git-Ansh/4P02-Project.git
          git fetch origin main
          git reset --hard origin/main

          # Clear Python bytecode cache
          find backend -type d -name __pycache__ -exec rm -rf {} + 2>/dev/null || true

          # Install/update backend dependencies
          cd backend
          source venv/bin/activate
          pip install -r requirements.txt --quiet

          # Restart the backend service
          sudo systemctl restart academicfbi

          echo "Deployment completed successfully!"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
