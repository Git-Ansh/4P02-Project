name: Deploy Backend to VPS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
    - uses: actions/checkout@v4

    - name: Deploy to VPS via SSH
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USERNAME }}
        key: ${{ secrets.VPS_SSH_KEY }}
        passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
        port: ${{ secrets.VPS_PORT }}
        envs: GITHUB_TOKEN
        script: |
          set -e
          cd ~/COSC_4P02/Project/4P02-Project

          # Pull latest changes using GitHub token (no VPS credentials needed)
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/Git-Ansh/4P02-Project.git
          git fetch origin main
          git reset --hard origin/main

          # Clear Python bytecode cache
          find backend -type d -name __pycache__ -exec rm -rf {} + 2>/dev/null || true

          # Install/update backend dependencies
          cd backend
          source venv/bin/activate
          pip install -r requirements.txt --quiet

          # Restart the backend service
          sudo systemctl restart academicfbi

          echo "Deployment completed successfully!"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
